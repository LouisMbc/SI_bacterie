apiVersion: v1
kind: ConfigMap
metadata: {name: grafana-datasource, namespace: bacterie}
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata: {name: grafana-dashboard-provider, namespace: bacterie}
data:
  provider.yml: |
    apiVersion: 1
    providers:
      - name: default
        folder: ''
        type: file
        options: {path: /var/lib/grafana/dashboards}
---
apiVersion: v1
kind: ConfigMap
metadata: {name: grafana-dashboard-bacteries, namespace: bacterie}
data:
  bacteries.json: |
    {
      "title": "Bacteries - tableau de bord",
      "panels": [
        {"type": "bargauge", "title": "Nombre de bacteries par etat",
         "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
         "targets": [{"expr": "bacteries_par_etat", "legendFormat": "{{etat}}"}]},
        {"type": "graph", "title": "Traversees cumulees par etat",
         "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
         "targets": [{"expr": "etat_traversee_total", "legendFormat": "{{etat}}"}]}
      ],
      "schemaVersion": 39,
      "time": {"from": "now-15m", "to": "now"}
    }
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: grafana, namespace: bacterie}
spec:
  replicas: 1
  selector: {matchLabels: {app: grafana}}
  template:
    metadata: {labels: {app: grafana}}
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          env:
            - {name: GF_AUTH_ANONYMOUS_ENABLED, value: "true"}
            - {name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Admin"}
          ports: [{containerPort: 3000}]
          volumeMounts:
            - {name: datasource, mountPath: /etc/grafana/provisioning/datasources}
            - {name: dash-provider, mountPath: /etc/grafana/provisioning/dashboards}
            - {name: dash-json, mountPath: /var/lib/grafana/dashboards}
      volumes:
        - {name: datasource, configMap: {name: grafana-datasource}}
        - {name: dash-provider, configMap: {name: grafana-dashboard-provider}}
        - {name: dash-json, configMap: {name: grafana-dashboard-bacteries}}
---
apiVersion: v1
kind: Service
metadata: {name: grafana, namespace: bacterie}
spec:
  type: NodePort
  selector: {app: grafana}
  ports: [{port: 3000, targetPort: 3000, nodePort: 30030}]