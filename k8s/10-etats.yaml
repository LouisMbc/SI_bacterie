---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stable
  namespace: bacterie
  labels: {app: stable}
spec:
  replicas: 1
  selector:
    matchLabels: {app: stable}
  template:
    metadata:
      labels: {app: stable}
    spec:
      containers:
        - name: stable
          image: bacterie-etat:latest
          imagePullPolicy: IfNotPresent
          env:
            - {name: ETAT, value: "stable"}
          ports:
            - {containerPort: 50051, name: grpc}
            - {containerPort: 8000, name: metrics}
---
apiVersion: v1
kind: Service
metadata:
  name: stable
  namespace: bacterie
spec:
  selector: {app: stable}
  ports:
    - {name: grpc, port: 50051, targetPort: 50051}
    - {name: metrics, port: 8000, targetPort: 8000}
