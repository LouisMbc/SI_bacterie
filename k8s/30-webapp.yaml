apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: bacterie
spec:
  replicas: 1
  selector:
    matchLabels: {app: webapp}
  template:
    metadata:
      labels: {app: webapp}
    spec:
      containers:
        - name: webapp
          image: bacterie-webapp:latest
          imagePullPolicy: IfNotPresent
          env:
            - {name: STABLE_ADDR, value: "stable:50051"}
            - {name: HYPERTROPHIE_ADDR, value: "hypertrophie:50051"}
            - {name: ATROPHIE_ADDR, value: "atrophie:50051"}
            - {name: IMPASSE_ADDR, value: "impasse:50051"}
            - {name: STATE_MANAGER_ADDR, value: "state-manager:9090"}
          ports:
            - {containerPort: 5000}
---
apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: bacterie
spec:
  type: NodePort
  selector: {app: webapp}
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080